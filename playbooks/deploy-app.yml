---
- name: Zero-Downtime Application Deployment
  hosts: "{{ target_hosts | default('app_servers') }}"
  become: true
  serial: "30%"  # Rolling update - 30% at a time
  vars:
    app_name: "{{ app_name }}"
    app_version: "{{ app_version }}"
    deploy_dir: "/opt/{{ app_name }}"
    health_check_url: "http://localhost:{{ app_port | default(8080) }}/health"
    health_check_retries: 10
    health_check_delay: 5

  pre_tasks:
    - name: Remove host from load balancer
      command: aws elbv2 deregister-targets
        --target-group-arn "{{ elb_target_group_arn }}"
        --targets Id="{{ ansible_host }}"
      delegate_to: localhost
      when: elb_target_group_arn is defined

    - name: Wait for connections to drain
      pause:
        seconds: 30
      when: elb_target_group_arn is defined

  tasks:
    - name: Pull new Docker image
      community.docker.docker_image:
        name: "{{ ecr_registry }}/{{ app_name }}"
        tag: "{{ app_version }}"
        source: pull
        force_source: true

    - name: Stop current container gracefully
      community.docker.docker_container:
        name: "{{ app_name }}"
        state: stopped
        stop_timeout: 30
      ignore_errors: true

    - name: Start new container version
      community.docker.docker_container:
        name: "{{ app_name }}"
        image: "{{ ecr_registry }}/{{ app_name }}:{{ app_version }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "{{ app_port | default(8080) }}:8080"
        env:
          ENV: "{{ env }}"
          APP_VERSION: "{{ app_version }}"
        log_driver: awslogs
        log_options:
          awslogs-group: "/app/{{ app_name }}"
          awslogs-region: "{{ aws_region }}"

    - name: Wait for application health check
      uri:
        url: "{{ health_check_url }}"
        status_code: 200
      retries: "{{ health_check_retries }}"
      delay: "{{ health_check_delay }}"
      register: health_check

    - name: Fail if health check did not pass
      fail:
        msg: "Application health check failed after deployment"
      when: health_check.status != 200

  post_tasks:
    - name: Re-register host with load balancer
      command: aws elbv2 register-targets
        --target-group-arn "{{ elb_target_group_arn }}"
        --targets Id="{{ ansible_host }}"
      delegate_to: localhost
      when: elb_target_group_arn is defined

    - name: Deployment success notification
      community.general.slack:
        token: "{{ slack_token }}"
        msg: "✅ {{ app_name }} v{{ app_version }} deployed to {{ env }} on {{ ansible_host }}"
        channel: "#deployments"
      delegate_to: localhost
      ignore_errors: true
